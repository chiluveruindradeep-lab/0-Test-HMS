name: WORKING 100% - CI/CD Pipeline (Fixed Angular + GCS + Approvals)

on:
  workflow_dispatch:
    inputs:
      env_target:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-test
          - cloud-prod
        default: cloud-prod


permissions:
  contents: read
  id-token: write

jobs:

# -------------------------------------------------------
# JOB 1 - BUILD + PACKAGE (FIXED)
# -------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    outputs:
      zip_name: ${{ steps.zip.outputs.zip_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          ref: his-production
          fetch-depth: 0
          
# -------------------------------------------------
# JOB 2 - NODE SETUP
# -------------------------------------------------
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

# -------------------------------------------------
# JOB 3 - INSTALL DEPS
# -------------------------------------------------
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline --no-audit --progress=false

# -------------------------------------------------
# JOB 4 - BUILD & ZIP & UPLOAD
# -------------------------------------------------
      - name: Configure Git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # ✅ Versioning
      - name: Set version
        run: |
          ENV="${{ github.event.inputs.env_target }}"
          BASE_VERSION=$(node -p "require('./package.json').version")

          if [ "$ENV" = "cloud-prod" ]; then
            VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          elif [ "$ENV" = "cloud-test" ]; then
            VERSION="${BASE_VERSION}-test.${GITHUB_RUN_NUMBER}"
          else
            VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ✅ Inject version
      - name: Inject version
        run: |
          cat > src/environments/version.ts <<EOF
          export const environment = {
            version: '${{ env.VERSION }}'
          };
          EOF

      - name: Check memory
        run: free -h

      # ✅ Build Angular (SAFE)
      - name: Build Angular
        run: npm run build:${{ github.event.inputs.env_target }}
        env:
          NODE_OPTIONS: --max_old_space_size=6144

      # ✅ Fix: correct dist folder
      - name: Prepare build folder
        run: |
          APP_DIR=$(ls dist | head -n 1)
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
      
      
      - name: Create ZIP
        id: zip
        run: |
          TIMESTAMP=$(date +"%d-%m-%Y_%H-%M")
          ZIP_NAME="${{ github.event.inputs.env_target }}-v${{ env.VERSION }}-$TIMESTAMP.zip"

          echo "📁 Dist contents:"
          ls -R dist

          DIST_DIR="dist/hms-app/browser"

          if [ ! -d "$DIST_DIR" ]; then
            echo "❌ Browser folder not found"
            exit 1
          fi

          ZIP_PATH="$GITHUB_WORKSPACE/$ZIP_NAME"

          echo "Using dist folder: $DIST_DIR"
          echo "Creating ZIP: $ZIP_PATH"

          cd "$DIST_DIR"

          zip -r "$ZIP_PATH" .

          cd -

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

          ls -lh "$ZIP_PATH"

      # ✅ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

# -------------------------------------------------
# JOB 5 - DEPLOY TO UNC SHARE
# -------------------------------------------------

  deploy:
    needs: build
    runs-on: self-hosted   # MUST be Windows runner with network access

    steps:

      # =========================
      # 1️⃣ Setup workspace
      # =========================
      - name: Prepare workspace
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $dir = "$env:GITHUB_WORKSPACE\download"

          if (Test-Path $dir) {
            Remove-Item $dir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $dir | Out-Null

          # FIX: Write DOWNLOAD_DIR to GITHUB_ENV only once
          echo "DOWNLOAD_DIR=$dir" >> $env:GITHUB_ENV

      # =========================
      # 2️⃣ Download artifact
      # =========================
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: download

      # =========================
      # 3️⃣ Validate artifact
      # =========================
      - name: Validate ZIP
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $zip = Get-ChildItem "$env:DOWNLOAD_DIR" -Recurse -Filter *.zip | Select-Object -First 1

          if (-not $zip) {
            throw "❌ ZIP not found in artifact"
          }

          if ($zip.Length -lt 1KB) {
            throw "❌ ZIP is too small / corrupted"
          }

          $hash = Get-FileHash $zip.FullName -Algorithm SHA256
          echo "ZIP_PATH=$($zip.FullName)" >> $env:GITHUB_ENV

          Write-Host "ZIP OK"
          Write-Host $hash.Hash

      # =====================================
      # 🌐 STEP 4 — Build dynamic deploy path
      # =====================================
      - name: Build deployment path
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $envTarget = "${{ github.event.inputs.env_target }}"

          # Correct format: 16-MAY-2026
          $timestamp = (Get-Date).ToString("dd-MMM-yyyy").ToUpper()

          # Base UNC path
          $basePath = "\\HP\ahh-his-deployment"

          # Final path: \\HP\ahh-his-deployment\ENV\timestamp
          $targetPath = Join-Path $basePath $envTarget
          $targetPath = Join-Path $targetPath $timestamp

          Write-Host "Target deployment path: $targetPath"

          echo "TARGET_PATH=$targetPath" >> $env:GITHUB_ENV
          echo "TIMESTAMP=$timestamp" >> $env:GITHUB_ENV

      # ============================================
      # 🌐 STEP 5 — Check & Create Folder Structure
      # ============================================
      - name: Prepare network directory
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $path = $env:TARGET_PATH

          for ($i = 1; $i -le 5; $i++) {

            try {

              if (-not (Test-Path $path)) {
                New-Item -ItemType Directory -Path $path -Force | Out-Null
            }

            if (Test-Path $path) {
              Write-Host "Directory ready: $path"
              break
            }

          }
          catch {
            Write-Warning "Attempt $i failed creating directory: $($_.Exception.Message)"
          }

          Start-Sleep 5

          if ($i -eq 5) {
            throw "Failed to create network directory after 5 attempts"
          }
          }
      # =============================================
      # 🌐 STEP 6 — Copy ZIP to network share
      # =============================================
      - name: Copy ZIP to versioned path
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path $env:TARGET_PATH)) {
            throw "Network path unavailable: $env:TARGET_PATH"
          }

          $zip = "$env:ZIP_PATH"

          if (-not (Test-Path $zip)) {
            throw "ZIP file missing: $zip"
          }

          $newFileName = Split-Path $zip -Leaf
          $dest = Join-Path $env:TARGET_PATH $newFileName

          $success = $false

          for ($i = 1; $i -le 3; $i++) {

            try {

              Copy-Item $zip $dest -Force -ErrorAction Stop

              if (Test-Path $dest) {
                Write-Host "Copy success on attempt $i"
                $success = $true
                break
              }

            }
            catch {
              Write-Warning "Attempt $i failed: $($_.Exception.Message)"
              Start-Sleep 5
            }
          }

          if (-not $success) {
            throw "Network copy failed after 3 attempts"
          }

          "REMOTE_FILE=$dest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # =============================================
      # 🌐 STEP 7 — Final Integrity Check
      # =============================================
      - name: Validate remote file integrity
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $local = Get-FileHash "$env:ZIP_PATH" -Algorithm SHA256
          $remote = Get-FileHash "$env:REMOTE_FILE" -Algorithm SHA256

          Write-Host "Local : $($local.Hash)"
          Write-Host "Remote: $($remote.Hash)"

          if ($local.Hash -ne $remote.Hash) {
            throw "❌ Deployment corrupted — hash mismatch"
          }

          Write-Host "✔ Deployment successful: $env:REMOTE_FILE"