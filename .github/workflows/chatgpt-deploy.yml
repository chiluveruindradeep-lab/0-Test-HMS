name: 🚀 HospitalManagementSystem - Enterprise CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-test
          - cloud-prod
      version:
        description: "Release Version"
        required: true
        default: "v1.0.0.1"

env:
  PROJECT_NAME: HospitalManagementSystem
  BUCKET_NAME: claudedeployapp

# =========================
# 1️⃣ RESOLVE ENVIRONMENT
# =========================
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}
      folder: ${{ steps.set.outputs.folder }}
      versioned_path: ${{ steps.set.outputs.versioned_path }}
      url: ${{ steps.set.outputs.url }}

    steps:
      - id: set
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

          case "${{ github.event.inputs.environment }}" in

            cloud-dev)
              echo "branch=dev" >> $GITHUB_OUTPUT
              echo "folder=cloud-dev" >> $GITHUB_OUTPUT
              echo "url=https://storage.googleapis.com/${{ env.BUCKET_NAME }}/cloud-dev/app/index.html" >> $GITHUB_OUTPUT
              ;;

            cloud-test)
              echo "branch=test" >> $GITHUB_OUTPUT
              echo "folder=cloud-test" >> $GITHUB_OUTPUT
              echo "url=https://storage.googleapis.com/${{ env.BUCKET_NAME }}/cloud-test/app/index.html" >> $GITHUB_OUTPUT
              ;;

            cloud-prod)
              echo "branch=main" >> $GITHUB_OUTPUT
              echo "folder=cloud-prod" >> $GITHUB_OUTPUT
              echo "url=https://storage.googleapis.com/${{ env.BUCKET_NAME }}/cloud-prod/app/index.html" >> $GITHUB_OUTPUT
              ;;
          esac

# =========================
# 2️⃣ BUILD ANGULAR APP
# =========================
  build:
    needs: resolve
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.zip.outputs.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 Cache npm (enterprise speed optimization)
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - run: npm run build -- --configuration production

# =========================
# 3️⃣ CREATE VERSIONED ZIP
# =========================
      - id: zip
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          FOLDER=${{ needs.resolve.outputs.folder }}
          VERSION=${{ github.event.inputs.version }}

          ZIP_NAME="build_${FOLDER}_${TIMESTAMP}_${VERSION}.zip"

          cd dist || exit 1
          zip -r ../$ZIP_NAME .

          echo "name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.name }}

# =========================
# 4️⃣ TEST APPROVAL (LEAD)
# =========================
  test-approval:
    needs: [resolve, build]
    if: github.event.inputs.environment == 'cloud-test'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Lead
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🟡 TEST Approval Required - HMS"
          to: ${{ secrets.LEAD_EMAIL }}
          from: CI/CD Pipeline
          body: |
            Test Deployment Request

            Version: ${{ github.event.inputs.version }}
            Branch: test

            Please review before deployment.

# =========================
# 5️⃣ PROD APPROVAL (MANAGER GATE)
# =========================
  prod-approval:
    needs: [resolve, build]
    if: github.event.inputs.environment == 'cloud-prod'
    runs-on: ubuntu-latest
    environment:
      name: cloud-prod

    steps:
      - run: echo "Waiting for Manager Approval..."

# =========================
# 6️⃣ DEPLOY TO GCP (BLUE/GREEN READY)
# =========================
  deploy:
    needs: [resolve, build]
    runs-on: ubuntu-latest

    outputs:
      deploy_url: ${{ needs.resolve.outputs.url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

# =========================
# 📦 Upload Versioned Release
# =========================
      - name: Upload Release to GCS
        run: |
          FOLDER=${{ needs.resolve.outputs.folder }}
          VERSION=${{ github.event.inputs.version }}

          RELEASE_PATH="releases/$VERSION"

          gsutil cp *.zip gs://$BUCKET_NAME/$FOLDER/$RELEASE_PATH/

# =========================
# 🔄 BLUE/GREEN DEPLOY SWITCH
# =========================
      - name: Deploy to Live (Green)
        run: |
          FOLDER=${{ needs.resolve.outputs.folder }}
          VERSION=${{ github.event.inputs.version }}

          gsutil -m rsync -r gs://$BUCKET_NAME/$FOLDER/releases/$VERSION/ \
            gs://$BUCKET_NAME/$FOLDER/live/

# =========================
# 🧪 HEALTH CHECK
# =========================
      - name: Health Check
        run: |
            URL="https://storage.googleapis.com/${{ env.BUCKET_NAME }}/${{ needs.resolve.outputs.folder }}/app/index.html"

            echo "Checking $URL"
            curl -f $URL || exit 1

# =========================
# 7️⃣ CLEANUP OLD BUILDS (KEEP LAST 5)
# =========================
      - name: Retention Policy
        run: |
          FOLDER=${{ needs.resolve.outputs.folder }}

          gsutil ls gs://$BUCKET_NAME/$FOLDER/releases/ \
          | sort -r \
          | tail -n +6 \
          | xargs -r gsutil rm

# =========================
# 8️⃣ NOTIFICATIONS
# =========================
  notify:
    needs: [resolve, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ Deployment Successful - HMS"
          to: ${{ secrets.MANAGER_EMAIL }}
          from: CI/CD Pipeline
          body: |
            🚀 Deployment Successful

            Environment: ${{ github.event.inputs.environment }}
            Version: ${{ github.event.inputs.version }}

            Live URL: ${{ needs.resolve.outputs.url }}

      - name: Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Deployment Failed - HMS"
          to: ${{ secrets.MANAGER_EMAIL }}
          from: CI/CD Pipeline
          body: |
            ❌ Deployment Failed

            Environment: ${{ github.event.inputs.environment }}

            Check GitHub logs for details.